<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up Form</title>
  <link rel="stylesheet" href="form.css">
</head>
<body>
  <div class="page-wrapper">
    <form id="signupForm" class="signup-form" novalidate>
      <h1>Sign Up</h1>

      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" placeholder="Enter username">
        <p class="error-message"></p>
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="hello@example.com">
        <p class="error-message"></p>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Enter password">
        <p class="error-message"></p>
      </div>

      <div class="form-group">
        <label for="confirmPassword">Confirm Password</label>
        <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Reenter your password">
        <p class="error-message"></p>
      </div>

      <button type="submit">SIGN UP</button>
    </form>
  </div>

  <script src="form.js"></script>
</body>
</html>
